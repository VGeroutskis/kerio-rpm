name: Build RPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
    - name: Install build tools
      run: |
        dnf install -y rpm-build tar gzip

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      run: |
        # Extract version from tag (e.g., v1.0.1 -> 1.0.1)
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        if [[ "$TAG_VERSION" == "refs/heads/main" ]] || [[ "$TAG_VERSION" == "workflow_dispatch" ]]; then
          TAG_VERSION=$(grep "Version:" rpm/kerio-rpm.spec | awk '{print $2}')
        fi
        echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
        
        # Update spec file with the tag version
        sed -i "s/Version:.*/Version: $TAG_VERSION/" rpm/kerio-rpm.spec

    - name: Prepare Source Tarball
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        NAME=kerio-rpm
        mkdir -p ~/rpmbuild/SOURCES
        # Create a tarball that matches Source0 in spec
        tar --transform "s|^|kerio-rpm-$VERSION/|" -czf ~/rpmbuild/SOURCES/$NAME-$VERSION.tar.gz .

    - name: Build RPM
      run: |
        rpmbuild -ba rpm/kerio-rpm.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kerio-rpm-package
        path: /root/rpmbuild/RPMS/noarch/*.rpm

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: /root/rpmbuild/RPMS/noarch/*.rpm
