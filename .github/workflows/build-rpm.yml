name: Build RPM

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container: fedora:44

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        dnf install -y rpm-build rpmdevtools python3-devel tar gzip rpmlint

    - name: Prepare source tarball
      run: |
        NAME=$(grep -i '^Name:' rpm/kerio-rpm.spec | awk '{print $2}')
        if [[ $GITHUB_REF == refs/tags/v* ]]; then VERSION=${GITHUB_REF#refs/tags/v}; sed -i "s/^Version:.*/Version:        $VERSION/" rpm/kerio-rpm.spec; else VERSION=$(grep -i '^Version:' rpm/kerio-rpm.spec | awk '{print $2}'); fi
        mkdir -p /github/home/rpmbuild/SOURCES
        tar -czf /github/home/rpmbuild/SOURCES/$NAME-$VERSION.tar.gz --transform "s|^|$NAME-$VERSION/|" --exclude=".git" --exclude=".github" .

    - name: Build RPM
      run: |
        rpmbuild --define "_topdir /github/home/rpmbuild" -ba rpm/kerio-rpm.spec

    - name: Run rpmlint
      run: |
        rpmlint rpm/kerio-rpm.spec
        rpmlint /github/home/rpmbuild/RPMS/noarch/*.rpm || true

    - name: Upload RPM artifact
      uses: actions/upload-artifact@v4
      with:
        name: kerio-rpm-fedora
        path: /github/home/rpmbuild/RPMS/noarch/*.rpm

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: /github/home/rpmbuild/RPMS/noarch/*.rpm
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
