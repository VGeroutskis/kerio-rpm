name: Build RPM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest

    steps:
    - name: Install build tools
      run: |
        dnf install -y rpm-build tar gzip findutils

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version from tag
      id: get_version
      run: |
        TAG_VERSION=${GITHUB_REF#refs/tags/v}
        if [[ "$TAG_VERSION" == "refs/heads/main" ]] || [[ "$TAG_VERSION" == "workflow_dispatch" ]]; then
          TAG_VERSION=$(grep "Version:" rpm/kerio-rpm.spec | awk '{print $2}')
        fi
        echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
        sed -i "s/Version:.*/Version: $TAG_VERSION/" rpm/kerio-rpm.spec

    - name: Prepare Source Tarball
      run: |
        VERSION=${{ steps.get_version.outputs.version }}
        NAME=kerio-rpm
        mkdir -p ~/rpmbuild/SOURCES
        tar --transform "s|^|kerio-rpm-$VERSION/|" -czf ~/rpmbuild/SOURCES/$NAME-$VERSION.tar.gz .

    - name: Build RPM
      run: |
        rpmbuild -ba rpm/kerio-rpm.spec

    - name: Locate RPMs
      id: locate
      run: |
        # Find all .rpm files and save the directory to a variable
        RPM_PATH=$(find ~/rpmbuild/RPMS -name "*.rpm" | head -n 1)
        RPM_DIR=$(dirname "$RPM_PATH")
        echo "rpm_dir=$RPM_DIR" >> $GITHUB_OUTPUT
        echo "Found RPMs in: $RPM_DIR"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: kerio-rpm-package
        path: ${{ steps.locate.outputs.rpm_dir }}/*.rpm

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.locate.outputs.rpm_dir }}/*.rpm
